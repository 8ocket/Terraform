# .github/workflows/apply.yml

# 깃허브 Actions 메뉴에서 보여질 파이프라인의 이름입니다.
name: "Terraform Prod Pipeline"

# 언제 이 스크립트를 실행할지 정합니다.
on:
  push:
    branches:
      - main
    # prod 폴더 안의 내용이 바뀔 때만 실행되도록 제한합니다.
    paths:
      - 'prod/**'

# OIDC 무암호 출입증을 사용하기 위한 필수 권한 설정입니다.
permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # Job 1: 실행 계획(Plan)을 먼저 만들어서 보여줍니다.
  # ==========================================
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    # 모든 테라폼 명령어는 prod 폴더 안에서 실행되도록 고정합니다.
    defaults:
      run:
        working-directory: ./prod
        
    steps:
      # 1. 코드를 임시 컴퓨터로 가져옵니다.
      - name: "Checkout Code"
        uses: actions/checkout@v3
        
      # 2. 테라폼을 설치합니다.
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.14.0"
          
      # 3. AWS OIDC 출입증으로 로그인합니다.
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          # (필수 변경) 아까 확인한 12자리 계정 ID를 아래에 꼭 넣어주세요!
          role-to-assume: "arn:aws:iam::854439979580:role/8ocket-github-actions-role"
          aws-region: "ap-northeast-2"
          
      # 4. 테라폼 초기화 및 Plan 실행
      - name: "Terraform Init"
        run: terraform init
        
      - name: "Terraform Plan"
        run: terraform plan

  # ==========================================
  # Job 2: 사람의 승인이 떨어지면 실제 인프라를 만듭니다 (Apply).
  # ==========================================
  apply:
    name: "Terraform Apply"
    # (핵심) 위 plan 작업이 에러 없이 끝나야만 이 작업이 시작됩니다.
    needs: plan
    runs-on: ubuntu-latest
    # (핵심) 깃허브에 설정해둔 'production' 환경 보호 규칙(사람의 승인)을 통과해야 실행됩니다.
    environment: approve
    
    defaults:
      run:
        working-directory: ./prod
        
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3
        
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.14.0"
          
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: "arn:aws:iam::854439979580:role/8ocket-github-actions-role"
          aws-region: "ap-northeast-2"
          
      - name: "Terraform Init"
        run: terraform init
        
      # 관리자가 승인했으므로, 묻지 않고 바로 적용합니다.
      - name: "Terraform Apply"
        run: terraform apply -auto-approve